<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #000000;
            --secondary-color: #757575;
            --bg-color: #ffffff;
            --spacing: 3rem;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Responsivo */
        header {
            padding: 1.5rem var(--spacing);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        header h1 a {
            text-decoration: none;
            color: inherit;
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--secondary-color);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition);
            opacity: 0.7;
        }

        nav a:hover {
            opacity: 1;
            color: var(--primary-color);
        }

        /* Contenedor Principal Adaptable */
        main {
            padding: var(--spacing) 5%;
            max-width: 1440px;
            margin: 0 auto;
            min-height: 80vh;
        }

        /* Footer */
        footer {
            padding: var(--spacing);
            text-align: center;
            font-size: 0.8rem;
            color: var(--secondary-color);
            border-top: 1px solid #f0f0f0;
            margin-top: 4rem;
        }

        .footer-links {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.7rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .footer-links a:hover {
            color: var(--secondary-color);
        }

        .img-fluid {
            width: 100%;
            height: auto;
            display: block;
            transition: var(--transition);
        }

        /* Rejilla Responsiva para Portafolio e Inicio */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* --- MEDIA QUERIES PARA RESPONSIVIDAD --- */

        @media (max-width: 768px) {
            :root {
                --spacing: 1.5rem;
            }

            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
                padding: 1rem;
            }

            nav {
                gap: 1rem;
                justify-content: center;
                width: 100%;
            }

            nav a {
                margin-left: 0;
                font-size: 0.65rem;
            }

            main {
                padding-top: 2rem;
            }

            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1rem;
            }

            nav {
                flex-wrap: wrap;
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="{{ site.baseurl }}/">{{ site.author.name }}</a></h1>
        <nav>
            <a href="{{ site.baseurl }}/portfolio">Portfolio</a>
            <a href="{{ site.baseurl }}/blog">Blog</a>
            <a href="{{ site.baseurl }}/perfil">Sobre mí</a>
            <a href="{{ site.baseurl }}/verificacion">Verificación</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-links">
            <a href="https://www.instagram.com/naniitre?igsh=MXA5dWx4czN4OGFtaw==" target="_blank" rel="noopener">Instagram</a>
            <a href="https://patreon.com/Daniverso?utm_medium=clipboard_copy&utm_source=copyLink&utm_campaign=creatorshare_fan&utm_content=join_link" target="_blank" rel="noopener">Patreon</a>
        </div>
        <p>&copy; {{ "now" | date: "%Y" }} Edna Daniela Trejo Martínez | Nanitre | Todos los derechos reservados.</p>
    </footer>

</body>
</html>
