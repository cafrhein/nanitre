# Identidad del Sitio
title: Edna Daniela Trejo Martínez | Nanitre
email: contacto@nanitre.com
description: >-
  Ecosistema digital y portafolio artístico de Edna Daniela Trejo. 
  Exploración visual, procesos creativos y verificación de autenticidad.

# Configuración de URLs
# Ajustado para que funcione en cafrhein.github.io/nanitre/
baseurl: "/nanitre"
url: "https://cafrhein.github.io"

# Configuración de Colecciones
collections:
  portfolio:
    output: true
    permalink: /obra/:title/
  posts:
    output: true
    permalink: /blog/:title/

# Ajustes de Build
markdown: kramdown
highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - bundle/

# Datos Personalizados
author:
  name: "Daniela Trejo"
  github: "danitrejo"
  instagram: "@nanitre.art"
